name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Run checks (logic + screenshots)
        run: swift run TrayChecks ./screenshots
      - name: Upload generated screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/*.png
          if-no-files-found: ignore
