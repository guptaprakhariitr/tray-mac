# XcodeGen spec → generates Tray.xcodeproj for Mac App Store archiving.
#   DEVELOPMENT_TEAM=ABCDE12345 xcodegen generate
# (Command Line Tools can't archive a submittable .app; full Xcode is required —
#  this project is built on your signing machine. See docs/APP_STORE_SUBMISSION.md)
name: Tray
options:
  bundleIdPrefix: com.plainware
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  Core:
    path: Packages/Core
  DrawerEngine:
    path: Engines/DrawerEngine

targets:
  TrayUI:
    type: framework
    platform: macOS
    sources:
      - path: Sources/TrayUI
    dependencies:
      - package: Core
        product: DesignSystem
      - package: Core
        product: CommonUI
      - package: Core
        product: SettingsKit
      - package: Core
        product: RemoteConfigKit
      - package: Core
        product: LicenseKit
      - package: Core
        product: UpdateKit
      - package: Core
        product: LogKit
      - package: DrawerEngine
        product: DrawerEngine
    settings:
      base:
        PRODUCT_NAME: TrayUI
        PRODUCT_BUNDLE_IDENTIFIER: com.plainware.tray.ui
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
        CODE_SIGN_STYLE: Automatic
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO

  Tray:
    type: application
    platform: macOS
    sources:
      - path: Sources/Tray
      - path: Resources/Assets.xcassets
      - path: Resources/PrivacyInfo.xcprivacy
      - path: Resources/GoogleService-Info.plist
    dependencies:
      - target: TrayUI
      - package: Core
        product: DesignSystem
      - package: Core
        product: CommonUI
      - package: Core
        product: SettingsKit
      - package: Core
        product: RemoteConfigKit
      - package: Core
        product: LicenseKit
      - package: Core
        product: UpdateKit
      - package: Core
        product: LogKit
      - package: DrawerEngine
        product: DrawerEngine
    settings:
      base:
        PRODUCT_NAME: Tray
        PRODUCT_BUNDLE_IDENTIFIER: com.plainware.tray
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Tray.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
        ENABLE_HARDENED_RUNTIME: NO        # Mac App Store uses App Sandbox, not Hardened Runtime
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
